<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a0e00"/>
      <stop offset="100%" stop-color="#0d0400"/>
    </linearGradient>
    <!-- Sand gradient (top section) -->
    <linearGradient id="st" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#dea040"/>
      <stop offset="100%" stop-color="#9a4f10"/>
    </linearGradient>
    <!-- Sand gradient (bottom section) -->
    <linearGradient id="sb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7a3d08"/>
      <stop offset="100%" stop-color="#c86018"/>
    </linearGradient>
    <!-- Wood frame gradient (horizontal) -->
    <linearGradient id="wf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5a2800"/>
      <stop offset="38%"  stop-color="#cc6010"/>
      <stop offset="62%"  stop-color="#cc6010"/>
      <stop offset="100%" stop-color="#5a2800"/>
    </linearGradient>
    <!-- Clip: top triangle -->
    <clipPath id="cti">
      <polygon points="16,19 84,19 53,52 47,52"/>
    </clipPath>
    <!-- Clip: bottom triangle -->
    <clipPath id="cbi">
      <polygon points="47,52 53,52 84,81 16,81"/>
    </clipPath>
  </defs>

  <!-- App icon background (rounded square) -->
  <rect width="100" height="100" rx="21" fill="url(#bg)"/>

  <!-- Top sand (full) -->
  <rect x="16" y="19" width="68" height="33" fill="url(#st)" clip-path="url(#cti)"/>

  <!-- Bottom sand (~38% full, fills from base) -->
  <rect x="16" y="69" width="68" height="12" fill="url(#sb)" clip-path="url(#cbi)"/>

  <!-- Hourglass glass outline -->
  <polygon
    points="16,19 84,19 53,52 47,52 84,81 16,81 47,52 53,52"
    fill="none" stroke="url(#wf)" stroke-width="4.5"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Top cap (wood bar) -->
  <rect x="12" y="14" width="76" height="8" rx="3" fill="url(#wf)"/>
  <!-- Bottom cap (wood bar) -->
  <rect x="12" y="78" width="76" height="8" rx="3" fill="url(#wf)"/>
</svg>
